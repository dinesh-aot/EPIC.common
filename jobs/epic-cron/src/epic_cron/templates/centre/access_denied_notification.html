<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EPIC Access Request: {{ user_name }} for {{ application_name }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      color: #003366;
      background-color: #ffffff;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    .logo {
      text-align: left;
      margin-bottom: 20px;
    }
    .logo img {
      max-width: 220px;
      height: auto;
    }
    .content {
      font-size: 16px;
      line-height: 1.6;
      color: #333;
      text-align: left;
    }
    .grey-box {
      background-color: #FAF9F8;
      padding: 16px;
      border-left: 4px solid #1a5a96;
      margin: 20px 0;
    }
    .grey-box p {
      margin: 0 0 10px 0;
    }
    .grey-box a {
      color: #1a5a96;
      font-weight: bold;
      text-decoration: none;
    }
    .grey-box a:hover {
      text-decoration: underline;
    }
    .footer {
      font-size: 12px;
      color: #666;
      margin-top: 30px;
      text-align: left;
    }
    .cta-link {
      color: #1a5a96;
      font-weight: bold;
      text-decoration: none;
    }
    .cta-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="{{ logo_url }}" alt="EPIC Logo"/>
    </div>

    <div class="content">
      <p>Hello, {{user_name}}</p>

      <p>Your access request for {{application_name}} has been denied.</p>
      <p>If you have any questions or believe you should have been approved, please email <a class="cta-link" href="mailto:EAO.EPICsystem@gov.bc.ca">EAO.EPICsystem@gov.bc.ca</a>.</p>
    
      <p>Thank you,</p>

      <p><strong>EPIC.centre System</strong></p>
    </div>

    <div class="footer">
      <p>This is an automated message. Please do not reply to this email.</p>
    </div>
  </div>
</body>
</html>
